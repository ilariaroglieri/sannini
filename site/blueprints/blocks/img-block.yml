name: Images Block
icon: image

open: true
fields:
  img_layout:
    label: Layout
    type: select
    default: full
    help: "Full = un'immagine a tutta larghezza. M+S = due colonne (media + small). S+S+S = tre colonne uguali. (Lo slot S può contenere 1 o 2 immagini."
    options:
      - value: full
        text: "L (Full width)"
      - value: m-s
        text: "M + S"
      - value: s-s-s
        text: "S + S + S"

  # ── FULL ──────────────────────────────────
  full_w_img:
    label: Image L (Full width)
    type: files
    max: 1
    accepts:
      mime: image/*
    when:
      img_layout: full

  # ── M + S ─────────────────────────────────
  medium_img:
    label: Image M (2/3)
    type: files
    max: 1
    accepts:
      mime: image/*
    when:
      img_layout: m-s
    width: 2/3

  small_img:
    label: Image S (1/3)
    type: files
    max: 2
    accepts:
      mime: image/*
    when:
      img_layout: m-s
    width: 1/3

  # ── S + S + S ─────────────────────────────
  image_s1:
    label: "Left image/s"
    type: files
    max: 2
    accepts:
      mime: image/*
    when:
      img_layout: s-s-s
    width: 1/3

  image_s2:
    label: "Center image/s"
    type: files
    max: 2
    accepts:
      mime: image/*
    when:
      img_layout: s-s-s
    width: 1/3

  image_s3:
    label: "Right image/s"
    type: files
    max: 1
    accepts:
      mime: image/*
    when:
      img_layout: s-s-s
    width: 1/3

  # Alignment
  alignment:
    label: Alignment
    type: select
    default: full
    options:
      - value: d-row
        text: Image M to the left
      - value: d-row-reverse
        text: Image M to the right
    when:
      img_layout: m-s

