title: Sito

tabs:

  # ──────────────────────────────────────────
  # TAB: HOME
  # ──────────────────────────────────────────
  home:
    label: Home
    icon: home
    sections:
      home_page:
        type: pages
        label: false
        parent: site
        templates:
          - home
        layout: list
        limit: 1
        empty: ""
        options: false

  # ──────────────────────────────────────────
  # TAB: PRODOTTI
  # ──────────────────────────────────────────
  prodotti:
    label: Prodotti
    icon: tag
    sections:
      prodotti_parent:
        type: pages
        label: false
        parent: site
        templates:
          - prodotti
        layout: list
        limit: 1
        empty: ""
        options: false

      prodotti_lista:
        type: pages
        label: Prodotti
        parent: site.find("prodotti")
        templates:
          - prodotto
        layout: cards
        image:
          query: page.immagine_copertina.toFile
        info: "{{ page.testo_introduttivo.excerpt(60) }}"
        empty: Nessun prodotto. Clicca "+" per aggiungerne uno.

  # ──────────────────────────────────────────
  # TAB: SISTEMI DI FACCIATA
  # ──────────────────────────────────────────
  sistemi:
    label: Sistemi di Facciata
    icon: layers
    sections:
      sistemi_parent:
        type: pages
        label: false
        parent: site
        templates:
          - sistemi-di-facciata
        layout: list
        limit: 1
        empty: ""
        options: false

      sistemi_lista:
        type: pages
        label: Sistemi
        parent: site.find("sistemi-di-facciata")
        templates:
          - sistema-di-facciata
        layout: list
        info: "{{ page.testo_lv1.excerpt(60) }}"
        empty: Nessun sistema. Clicca "+" per aggiungerne uno.

  # ──────────────────────────────────────────
  # TAB: REALIZZAZIONI
  # ──────────────────────────────────────────
  realizzazioni:
    label: Realizzazioni
    icon: images
    sections:
      realizzazioni_lista:
        type: pages
        label: Realizzazioni
        parent: site.find("realizzazioni")
        templates:
          - realizzazione
        layout: cards
        image:
          query: page.immagine_copertina.toFile
        info: "{{ page.didascalia }}"
        empty: Nessuna realizzazione. Clicca "+" per aggiungerne una.

  # ──────────────────────────────────────────
  # TAB: CONTATTI
  # ──────────────────────────────────────────
  contatti:
    label: Contatti
    icon: email
    sections:
      contatti_info:
        type: fields
        label: Informazioni
        fields:
          indirizzo:
            label: Indirizzo
            type: textarea
            rows: 3

          telefono:
            label: Telefono
            type: tel

          email:
            label: Email
            type: email

          instagram:
            label: Instagram
            type: url
            placeholder: "https://instagram.com/..."

      contatti_dipartimenti:
        type: fields
        label: Contatti aggiuntivi
        fields:
          dipartimenti:
            label: false
            help: "Aggiungi titolo e indirizzo email per ogni dipartimento o referente."
            type: structure
            columns:
              titolo:
                width: 1/2
              email:
                width: 1/2
            fields:
              titolo:
                label: Titolo
                type: text
              email:
                label: Email
                type: email
