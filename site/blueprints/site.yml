title: Sito

tabs:

  # ──────────────────────────────────────────
  # TAB: HOME
  # ──────────────────────────────────────────
  home:
    label: Home
    icon: home
    sections:
      home_page:
        type: pages
        label: false
        parent: site
        templates:
          - home
        layout: list
        limit: 1
        empty: ""
        options: false

  # ──────────────────────────────────────────
  # TAB: PRODOTTI
  # ──────────────────────────────────────────
  products:
    label:
      it: Prodotti 
      en: Products
    icon: tag
    sections:
      products_parent:
        type: pages
        label: 
          it: Pagina generale prodotti
          en: Products general page
        parent: site
        templates:
          - products
        layout: list
        limit: 1
        empty: ""
        options: false

      products_list:
        type: pages
        label:
          it: Prodotti 
          en: Products
        parent: site.find("prodotti")
        templates:
          - product
        layout: cards
        size: tiny
        image:
          query: page.cover_img.toFile
        empty: 
          it: Nessun prodotto. Clicca su "+" per aggiungerne uno.
          en: No products. Click "+" to add one.

  # ──────────────────────────────────────────
  # TAB: SISTEMI DI FACCIATA
  # ──────────────────────────────────────────
  claddingsystems:
    label:
      it: Sistemi di facciata 
      en: Cladding systems
    icon: layers
    sections:
      systems_parent:
        type: pages
        label:
          it: Sistemi di facciata (pagina generale) 
          en: Cladding systems general page
        parent: site
        templates:
          - cladding-systems
        layout: list
        limit: 1
        empty: ""
        options: false

      systems_list:
        type: pages
        label:
          it: Sistemi di facciata 
          en: Cladding systems
        parent: site.find("cladding-systems")
        templates:
          - cladding-system
        layout: list
        empty:
          it: Nessun sistema. Clicca su "+" per aggiungerne uno.
          en: No cladding systems. Click "+" to add one.

  # ──────────────────────────────────────────
  # TAB: REALIZZAZIONI
  # ──────────────────────────────────────────
  realizations:
    label: 
      it: Realizzazioni
      en: Realizations
    icon: images
    sections:
      realizations_list:
        type: pages
        label:
          it: Realizzazioni 
          en: Realizations
        parent: site.find("realizzazioni")
        templates:
          - realization
        empty: 
          it: Nessuna realizzazione. Clicca su "+" per aggiungerne una.
          en: No realizations. Click "+" to add one.

  # ──────────────────────────────────────────
  # TAB: CONTATTI
  # ──────────────────────────────────────────
  contacts:
    label:
      it: Contatti
      en: Contacts
    icon: email
    sections:
      contacts_page:
        type: pages
        label: 
          it: Pagina Contatti
          en: Contacts page
        parent: site
        templates:
          - contacts
        layout: list
        limit: 1
        empty: ""
        options: false

  # ──────────────────────────────────────────
  # TAB: MENU
  # ──────────────────────────────────────────
  main_menu:
    label: Menù
    icon: email
    sections:
      menu_section:
        type: fields
        fields:
          menu:
            type: structure
            label: Menu
            fields:
              page:
                type: pages
                label: Pagina
                max: 1