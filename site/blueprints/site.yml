title: Sito

tabs:

  # ──────────────────────────────────────────
  # TAB: HOME
  # ──────────────────────────────────────────
  home:
    label: Home
    icon: home
    sections:
      home_page:
        type: pages
        label: false
        parent: site
        templates:
          - home
        layout: list
        limit: 1
        empty: ""
        options: false

  # ──────────────────────────────────────────
  # TAB: PRODOTTI
  # ──────────────────────────────────────────
  products:
    label: Products
    icon: tag
    sections:
      products_parent:
        type: pages
        label: Products general page
        parent: site
        templates:
          - products
        layout: list
        limit: 1
        empty: ""
        options: false

      products_list:
        type: pages
        label: Products
        parent: site.find("products")
        templates:
          - product
        layout: cards
        size: tiny
        image:
          query: page.cover_img.toFile
        empty: No products. Click "+" to add one.

  # ──────────────────────────────────────────
  # TAB: SISTEMI DI FACCIATA
  # ──────────────────────────────────────────
  claddingsystems:
    label: Cladding systems
    icon: layers
    sections:
      systems_parent:
        type: pages
        label: Cladding systems general page
        parent: site
        templates:
          - cladding-systems
        layout: list
        limit: 1
        empty: ""
        options: false

      systems_list:
        type: pages
        label: Cladding systems
        parent: site.find("cladding-systems")
        templates:
          - cladding-system
        layout: list
        empty: No cladding systems. Click "+" to add one.

  # ──────────────────────────────────────────
  # TAB: REALIZZAZIONI
  # ──────────────────────────────────────────
  realizations:
    label: Realizations
    icon: images
    sections:
      realizations_list:
        type: pages
        label: Realizations
        parent: site.find("realizations")
        templates:
          - realization
        empty: No realizations. Click "+" to add one.

  # ──────────────────────────────────────────
  # TAB: CONTATTI
  # ──────────────────────────────────────────
  contacts:
    label: Contacts
    icon: email
    sections:
      contatti_info:
        type: fields
        label: Informations
        fields:
          indirizzo:
            label: Address
            type: textarea
            rows: 3

          telefono:
            label: Phone
            type: textarea

          email:
            label: Email
            type: email

          instagram:
            label: Instagram
            type: url
            placeholder: "https://instagram.com/..."

      additional_info:
        type: fields
        label: Additional contacts
        fields:
          departments:
            type: structure
            columns:
              title:
                width: 1/2
              email:
                width: 1/2
            fields:
              title:
                label: Titolo
                type: text
              email:
                label: Email
                type: email
