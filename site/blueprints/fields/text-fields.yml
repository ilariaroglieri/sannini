fields:
  small_title:
    label: Small title
    type: text

  text:
    label: Text
    extends:
      fields/writer-basic

  width:
    label: Width
    type: select
    default: d-whole
    options:
      - value: d-whole
        text: Full
      - value: d-two-thirds
        text: 2/3

  alignment:
    label: Alignment
    type: select
    default: align-right
    options:
      - value: align-left
        text: Left
      - value: align-right
        text: Right
    when:
      width: d-two-thirds